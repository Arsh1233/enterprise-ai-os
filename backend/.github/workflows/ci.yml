name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv pip install -e ".[dev]" --system

    - name: Ruff Check
      run: ruff check .

    - name: Ruff Format Check
      run: ruff format --check .

    - name: MyPy
      run: mypy .

    - name: Pytest with Coverage
      run: pytest
